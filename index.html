<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Lab #1 - 실시간 시세</title>
    <style>
        /* CSS: 디자인 담당 (강의자료 37번 참고) */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 500px; border: 1px solid #334155; }
        h1 { font-size: 1.5rem; text-align: center; color: #38bdf8; margin-bottom: 1.5rem; border-bottom: 2px solid #334155; padding-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: #94a3b8; font-size: 0.875rem; padding-bottom: 0.75rem; }
        td { padding: 1rem 0; border-top: 1px solid #334155; }
        .coin-name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .price { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 700; }
        .change { text-align: right; font-size: 0.875rem; }
        .up { color: #4ade80; }
        .down { color: #f87171; }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛓️ Blockchain Lab #1</h1>
        <table>
            <thead>
                <tr>
                    <th>코인명</th>
                    <th style="text-align: right;">가격 (USD)</th>
                    <th style="text-align: right;">24시간 변동</th>
                </tr>
            </thead>
            <tbody id="price-table">
                <tr><td colspan="3" style="text-align: center;">데이터 로딩 중...</td></tr>
            </tbody>
        </table>
        <div class="footer">
            Powered by CoinGecko API <br>
            <span id="update-time"></span>
        </div>
    </div>

    <script>
        /* JS: 동작 담당 (강의자료 38, 40번 참고) */
        async function fetchPrices() {
            try {
                const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true");
                const data = await response.json();
                
                const coins = [
                    { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC' },
                    { id: 'ethereum', name: 'Ethereum', symbol: 'ETH' }
                ];

                let html = '';
                coins.forEach(coin => {
                    const price = data[coin.id].usd.toLocaleString();
                    const change = data[coin.id].usd_24h_change.toFixed(2);
                    const changeClass = change >= 0 ? 'up' : 'down';
                    const changeIcon = change >= 0 ? '▲' : '▼';

                    html += `
                        <tr>
                            <td><div class="coin-name"><strong>${coin.name}</strong> <span>${coin.symbol}</span></div></td>
                            <td class="price">$${price}</td>
                            <td class="change ${changeClass}">${changeIcon} ${Math.abs(change)}%</td>
                        </tr>
                    `;
                });

                document.getElementById('price-table').innerHTML = html;
                document.getElementById('update-time').innerText = "최근 업데이트: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("데이터 로드 실패", error);
            }
        }

        // 페이지 열릴 때 실행하고 1분마다 갱신
        fetchPrices();
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
